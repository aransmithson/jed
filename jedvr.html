<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jed in Space — VR</title>
<script src="./aframe.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }

#game-iframe {
  position: fixed;
  left: -9999px;
  top: 0;
  width: 1920px;
  height: 1080px;
  border: none;
  pointer-events: none;
}

#vr-enter-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  font-family: sans-serif;
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  background: rgba(0,10,25,0.95);
  border: 1.5px solid rgba(0,170,255,0.6);
  color: #0af;
  padding: 14px 28px;
  cursor: pointer;
  text-shadow: 0 0 10px rgba(0,170,255,0.7);
  box-shadow: 0 0 20px rgba(0,170,255,0.15);
  transition: all 0.2s;
}
#vr-enter-btn:hover {
  background: rgba(0,170,255,0.12);
  box-shadow: 0 0 30px rgba(0,170,255,0.3);
}

#status {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: monospace;
  font-size: 14px;
  letter-spacing: 3px;
  color: rgba(0,170,255,0.8);
  z-index: 1000;
  pointer-events: none;
}
</style>
</head>
<body>

<iframe id="game-iframe" src="https://jedinspace.pages.dev" allow="autoplay"></iframe>
<div id="status">LOADING GAME...</div>

<a-scene id="vr-scene"
  xr-mode-ui="enterVRButton: #vr-enter-btn"
  renderer="antialias: true; logarithmicDepthBuffer: true; colorManagement: false;"
  vr-mode-ui="enabled: false">

  <!-- Deep space sky -->
  <a-sky color="#00000a"></a-sky>

  <!-- Star field -->
  <a-entity star-field></a-entity>

  <!-- Shooting stars -->
  <a-entity shooting-stars></a-entity>

  <!-- Game screen — big, curved feel via wide aspect -->
  <a-entity
    id="game-plane"
    geometry="primitive: plane; width: 9; height: 5.0625"
    position="0 1.8 -6"
    game-screen>
  </a-entity>

  <!-- Screen backing -->
  <a-entity
    geometry="primitive: plane; width: 9.08; height: 5.14"
    position="0 1.8 -6.01"
    material="color: #000408; opacity: 1; side: double">
  </a-entity>

  <!-- Cyan glow border -->
  <a-entity position="0 1.8 -5.99">
    <a-entity geometry="primitive: plane; width: 9.14; height: 0.018" position="0  2.57 0" material="color: #00aaff; opacity: 1; emissive: #00aaff; emissiveIntensity: 2"></a-entity>
    <a-entity geometry="primitive: plane; width: 9.14; height: 0.018" position="0 -2.57 0" material="color: #00aaff; opacity: 1; emissive: #00aaff; emissiveIntensity: 2"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.018; height: 5.16" position="-4.55 0 0" material="color: #00aaff; opacity: 1; emissive: #00aaff; emissiveIntensity: 2"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.018; height: 5.16" position=" 4.55 0 0" material="color: #00aaff; opacity: 1; emissive: #00aaff; emissiveIntensity: 2"></a-entity>
  </a-entity>

  <!-- Corner accent marks -->
  <a-entity position="0 1.8 -5.98">
    <a-entity geometry="primitive: plane; width: 0.3; height: 0.018" position="-4.4  2.56 0" material="color: #ffffff; opacity: 0.9; emissive: #ffffff; emissiveIntensity: 1"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.018; height: 0.3" position="-4.54 2.42 0" material="color: #ffffff; opacity: 0.9; emissive: #ffffff; emissiveIntensity: 1"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.3; height: 0.018" position=" 4.4  2.56 0" material="color: #ffffff; opacity: 0.9; emissive: #ffffff; emissiveIntensity: 1"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.018; height: 0.3" position=" 4.54 2.42 0" material="color: #ffffff; opacity: 0.9; emissive: #ffffff; emissiveIntensity: 1"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.3; height: 0.018" position="-4.4 -2.56 0" material="color: #ffffff; opacity: 0.9; emissive: #ffffff; emissiveIntensity: 1"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.018; height: 0.3" position="-4.54 -2.42 0" material="color: #ffffff; opacity: 0.9; emissive: #ffffff; emissiveIntensity: 1"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.3; height: 0.018" position=" 4.4 -2.56 0" material="color: #ffffff; opacity: 0.9; emissive: #ffffff; emissiveIntensity: 1"></a-entity>
    <a-entity geometry="primitive: plane; width: 0.018; height: 0.3" position=" 4.54 -2.42 0" material="color: #ffffff; opacity: 0.9; emissive: #ffffff; emissiveIntensity: 1"></a-entity>
  </a-entity>

  <!-- Soft screen glow light -->
  <a-light type="point" color="#003366" intensity="0.6" position="0 1.8 -4.5"></a-light>
  <a-light type="ambient" color="#080818" intensity="1"></a-light>

  <!-- Camera rig -->
  <a-entity id="rig" position="0 0 0">
    <a-camera wasd-controls-enabled="false" look-controls-enabled="true" fov="90"></a-camera>

    <a-entity id="left-ctrl"
      laser-controls="hand: left"
      raycaster="objects: #game-plane; showLine: true; lineColor: #00ddff; lineOpacity: 0.9; far: 30"
      controller-interaction>
    </a-entity>

    <a-entity id="right-ctrl"
      laser-controls="hand: right"
      raycaster="objects: #game-plane; showLine: true; lineColor: #00ddff; lineOpacity: 0.9; far: 30"
      controller-interaction>
    </a-entity>
  </a-entity>

</a-scene>

<button id="vr-enter-btn">⬡ Enter VR</button>

<script>
// ════════════════════════════════════════════════
//  game-screen — iframe canvas → live VR texture
// ════════════════════════════════════════════════
AFRAME.registerComponent('game-screen', {
  init: function () {
    this.texture = null;
    this.iframe = document.getElementById('game-iframe');
  },

  getCanvas: function () {
    try {
      const doc = this.iframe.contentDocument || this.iframe.contentWindow.document;
      if (!doc) return null;
      const c = doc.getElementById('sim');
      return (c && c.width > 0 && c.height > 0) ? c : null;
    } catch(e) { return null; }
  },

  tick: function () {
    const mesh = this.el.getObject3D('mesh');
    if (!mesh) return;

    if (!this.texture) {
      const gc = this.getCanvas();
      if (!gc) return;
      const THREE = AFRAME.THREE;
      const tex = new THREE.CanvasTexture(gc);
      tex.flipY = true;
      this.texture = tex;
      mesh.material = new THREE.MeshBasicMaterial({
        map: tex, side: THREE.DoubleSide, toneMapped: false
      });
      document.getElementById('status').textContent = '';
      console.log('[VR] texture live', gc.width, 'x', gc.height);
      return;
    }
    this.texture.needsUpdate = true;
  }
});

// ════════════════════════════════════════════════
//  controller-interaction — laser → iframe mouse
// ════════════════════════════════════════════════
AFRAME.registerComponent('controller-interaction', {
  init: function () {
    this.iframe = document.getElementById('game-iframe');
    this.lastX = 0;
    this.lastY = 0;
    this.pressing = false;
    this.el.addEventListener('raycaster-intersection', this.onMove.bind(this));
    this.el.addEventListener('triggerdown',            this.onTriggerDown.bind(this));
    this.el.addEventListener('triggerup',              this.onTriggerUp.bind(this));
    this.el.addEventListener('gripdown',               this.onGripDown.bind(this));
  },

  getCanvas: function () {
    try {
      const doc = this.iframe.contentDocument || this.iframe.contentWindow.document;
      return doc ? doc.getElementById('sim') : null;
    } catch(e) { return null; }
  },

  uvToCanvas: function (hit) {
    if (!hit || !hit.uv) return null;
    const gc = this.getCanvas();
    if (!gc) return null;
    return { x: hit.uv.x * gc.width, y: (1 - hit.uv.y) * gc.height };
  },

  getHit: function (e) {
    const hits = e.detail.intersections;
    if (!hits || !hits.length) return null;
    return hits.find(i => i.object && i.object.el && i.object.el.id === 'game-plane') || hits[0];
  },

  fire: function (type, x, y) {
    const gc = this.getCanvas();
    if (!gc) return;
    const win = this.iframe.contentWindow;
    const evt = new win.MouseEvent(type, {
      bubbles: true, cancelable: true,
      clientX: x, clientY: y,
      button: 0, buttons: this.pressing ? 1 : 0,
      view: win
    });
    if (type === 'mouseup') win.dispatchEvent(evt);
    else gc.dispatchEvent(evt);
  },

  onMove: function (e) {
    const c = this.uvToCanvas(this.getHit(e));
    if (!c) return;
    this.lastX = c.x; this.lastY = c.y;
    this.fire('mousemove', c.x, c.y);
  },
  onTriggerDown: function () { this.pressing = true;  this.fire('mousedown', this.lastX, this.lastY); },
  onTriggerUp:   function () { this.pressing = false; this.fire('mouseup',   this.lastX, this.lastY); },
  onGripDown: function () {
    const gc = this.getCanvas();
    if (!gc) return;
    const win = this.iframe.contentWindow;
    gc.dispatchEvent(new win.WheelEvent('wheel', {
      bubbles: true, cancelable: true,
      clientX: this.lastX, clientY: this.lastY, deltaY: -120, view: win
    }));
  }
});

// ════════════════════════════════════════════════
//  star-field — 4000 procedural stars
// ════════════════════════════════════════════════
AFRAME.registerComponent('star-field', {
  init: function () {
    const THREE = AFRAME.THREE;
    const n = 4000;
    const pos = new Float32Array(n * 3);
    const col = new Float32Array(n * 3);
    const sizes = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const r = 80 + Math.random() * 120;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      pos[i*3+2] = r * Math.cos(phi);
      const t = Math.random();
      if      (t < 0.55) { col[i*3]=1;   col[i*3+1]=1;    col[i*3+2]=1;   }
      else if (t < 0.75) { col[i*3]=0.7; col[i*3+1]=0.85; col[i*3+2]=1;   }
      else if (t < 0.90) { col[i*3]=1;   col[i*3+1]=0.9;  col[i*3+2]=0.7; }
      else               { col[i*3]=1;   col[i*3+1]=0.75; col[i*3+2]=0.75;}
      sizes[i] = 0.08 + Math.random() * 0.28;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));
    const mat = new THREE.PointsMaterial({
      vertexColors: true, sizeAttenuation: true,
      transparent: true, opacity: 0.95, size: 0.18
    });
    this.el.setObject3D('stars', new THREE.Points(geo, mat));
  }
});

// ════════════════════════════════════════════════
//  shooting-stars — occasional streaks across sky
// ════════════════════════════════════════════════
AFRAME.registerComponent('shooting-stars', {
  init: function () {
    this.THREE = AFRAME.THREE;
    this.active = [];   // active shooting stars
    this.nextSpawn = this.randomDelay();
    this.elapsed = 0;
  },

  randomDelay: function () {
    // spawn every 3–9 seconds
    return 3000 + Math.random() * 6000;
  },

  spawnStar: function () {
    const THREE = this.THREE;

    // Random point on a sphere shell far away, biased toward upper hemisphere
    const r = 70;
    const theta = Math.random() * Math.PI * 2;
    const phi = (0.1 + Math.random() * 0.6) * Math.PI; // avoid poles
    const ox = r * Math.sin(phi) * Math.cos(theta);
    const oy = r * Math.sin(phi) * Math.sin(theta) + 10;
    const oz = r * Math.cos(phi);

    // Streak direction — roughly tangential so it looks like it crosses the sky
    const dir = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      -(0.3 + Math.random() * 0.7),
      (Math.random() - 0.5) * 0.5
    ).normalize();

    const length = 4 + Math.random() * 8;
    const speed  = 25 + Math.random() * 35; // units per second

    // Build a thin line
    const points = [
      new THREE.Vector3(ox, oy, oz),
      new THREE.Vector3(ox + dir.x * length, oy + dir.y * length, oz + dir.z * length)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(points);

    // Gradient white → transparent via vertex colors
    const colArr = new Float32Array([1, 1, 1, 0.6, 0.85, 1]);
    geo.setAttribute('color', new THREE.BufferAttribute(colArr, 3));

    const mat = new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.95, linewidth: 1
    });
    const line = new THREE.Line(geo, mat);
    this.el.object3D.add(line);

    this.active.push({
      line, mat, dir,
      speed, length,
      life: 0,
      duration: (length / speed) * 1000 + 400 // ms to cross + fade
    });
  },

  tick: function (time, delta) {
    this.elapsed += delta;

    // Spawn check
    if (this.elapsed >= this.nextSpawn) {
      this.spawnStar();
      this.elapsed = 0;
      this.nextSpawn = this.randomDelay();
    }

    // Update active stars
    const toRemove = [];
    for (const s of this.active) {
      s.life += delta;
      const progress = s.life / s.duration;

      // Move the line forward
      const move = (delta / 1000) * s.speed;
      s.line.position.addScaledVector(s.dir, move);

      // Fade out in final 30%
      if (progress > 0.7) {
        s.mat.opacity = 0.95 * (1 - (progress - 0.7) / 0.3);
      }

      if (s.life >= s.duration) toRemove.push(s);
    }

    for (const s of toRemove) {
      this.el.object3D.remove(s.line);
      s.line.geometry.dispose();
      s.line.material.dispose();
      this.active.splice(this.active.indexOf(s), 1);
    }
  }
});

// ════════════════════════════════════════════════
//  WebXR support check
// ════════════════════════════════════════════════
if (!navigator.xr) {
  const btn = document.getElementById('vr-enter-btn');
  btn.textContent = '⬡ WebXR Not Supported';
  btn.style.opacity = '0.4';
  btn.style.cursor = 'not-allowed';
} else {
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    if (!ok) {
      const btn = document.getElementById('vr-enter-btn');
      btn.textContent = '⬡ VR Not Available';
      btn.style.opacity = '0.4';
      btn.style.cursor = 'not-allowed';
    }
  });
}
</script>
</body>
</html>
